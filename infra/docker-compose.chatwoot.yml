name: zenya-build

# Chatwoot fork (fazer-ai) + baileys-api, isolado. Reusa chatwoot-postgres e
# chatwoot-redis do infra/docker-compose.yml. Subir com:
#   docker compose --env-file .env -f infra/docker-compose.yml -f infra/docker-compose.chatwoot.yml up -d
# Variáveis sensíveis vêm do .env (gitignored): CHATWOOT_SECRET_KEY_BASE, BAILEYS_PROVIDER_DEFAULT_API_KEY.

services:
  baileys-api:
    image: ghcr.io/fazer-ai/baileys-api:latest
    pull_policy: always
    # A imagem não traz CMD (o tooling injeta); sem isto cai no help do Bun e reinicia.
    command: ["bun", "start"]
    depends_on:
      - chatwoot-redis
    environment:
      NODE_ENV: production
      PORT: "3025"
      ROLE: standalone
      LOG_LEVEL: info
      REDIS_URL: redis://chatwoot-redis:6379
    restart: unless-stopped
    # interno na rede docker; sem porta pública

  chatwoot-rails:
    image: ghcr.io/fazer-ai/chatwoot:latest
    pull_policy: always
    depends_on:
      - chatwoot-postgres
      - chatwoot-redis
      - baileys-api
    environment:
      NODE_ENV: production
      RAILS_ENV: production
      INSTALLATION_ENV: docker
      DEFAULT_LOCALE: pt_BR
      FRONTEND_URL: ${CHATWOOT_FRONTEND_URL:-http://localhost:3002}
      INTERNAL_HOST_URL: http://chatwoot-rails:3000
      POSTGRES_HOST: chatwoot-postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USERNAME: ${CHATWOOT_POSTGRES_USER:-chatwoot}
      POSTGRES_PASSWORD: ${CHATWOOT_POSTGRES_PASSWORD:-change-me}
      POSTGRES_DATABASE: ${CHATWOOT_POSTGRES_DB:-chatwoot}
      SECRET_KEY_BASE: ${CHATWOOT_SECRET_KEY_BASE}
      REDIS_URL: redis://chatwoot-redis:6379
      BAILEYS_PROVIDER_DEFAULT_CLIENT_NAME: Zenya
      BAILEYS_PROVIDER_DEFAULT_URL: http://baileys-api:3025
      BAILEYS_PROVIDER_DEFAULT_API_KEY: ${BAILEYS_PROVIDER_DEFAULT_API_KEY:-}
      BAILEYS_PROVIDER_USE_INTERNAL_HOST_URL: "true"
    entrypoint: docker/entrypoints/rails.sh
    command: ["bundle", "exec", "rails", "s", "-p", "3000", "-b", "0.0.0.0"]
    volumes:
      - chatwoot-storage:/app/storage
    ports:
      - "127.0.0.1:${CHATWOOT_PORT:-3002}:3000"
    restart: unless-stopped

  chatwoot-sidekiq:
    image: ghcr.io/fazer-ai/chatwoot:latest
    pull_policy: always
    depends_on:
      - chatwoot-postgres
      - chatwoot-redis
      - chatwoot-rails
    environment:
      NODE_ENV: production
      RAILS_ENV: production
      INSTALLATION_ENV: docker
      DEFAULT_LOCALE: pt_BR
      FRONTEND_URL: ${CHATWOOT_FRONTEND_URL:-http://localhost:3002}
      INTERNAL_HOST_URL: http://chatwoot-rails:3000
      POSTGRES_HOST: chatwoot-postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USERNAME: ${CHATWOOT_POSTGRES_USER:-chatwoot}
      POSTGRES_PASSWORD: ${CHATWOOT_POSTGRES_PASSWORD:-change-me}
      POSTGRES_DATABASE: ${CHATWOOT_POSTGRES_DB:-chatwoot}
      SECRET_KEY_BASE: ${CHATWOOT_SECRET_KEY_BASE}
      REDIS_URL: redis://chatwoot-redis:6379
      BAILEYS_PROVIDER_DEFAULT_CLIENT_NAME: Zenya
      BAILEYS_PROVIDER_DEFAULT_URL: http://baileys-api:3025
      BAILEYS_PROVIDER_DEFAULT_API_KEY: ${BAILEYS_PROVIDER_DEFAULT_API_KEY:-}
      BAILEYS_PROVIDER_USE_INTERNAL_HOST_URL: "true"
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
    volumes:
      - chatwoot-storage:/app/storage
    restart: unless-stopped

volumes:
  chatwoot-storage:
