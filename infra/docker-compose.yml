name: zenya-build

services:
  brain:
    build:
      context: ..
      dockerfile: apps/brain/Dockerfile
    env_file:
      - path: ../.env
        required: false
    environment:
      BRAIN_HOST: 0.0.0.0
      BRAIN_PORT: ${BRAIN_PORT:-3101}
      CHATWOOT_BASE_URL: ${CHATWOOT_BASE_URL:-http://chatwoot:3000}
    ports:
      - "127.0.0.1:${BRAIN_PORT:-3101}:3101"
    restart: unless-stopped

  chatwoot-postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${CHATWOOT_POSTGRES_DB:-chatwoot}
      POSTGRES_USER: ${CHATWOOT_POSTGRES_USER:-chatwoot}
      POSTGRES_PASSWORD: ${CHATWOOT_POSTGRES_PASSWORD:-chatwoot}
    volumes:
      - chatwoot-postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${CHATWOOT_POSTGRES_PORT:-5433}:5432"
    restart: unless-stopped

  chatwoot-redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - chatwoot-redis-data:/data
    ports:
      - "127.0.0.1:${CHATWOOT_REDIS_PORT:-6380}:6379"
    restart: unless-stopped

  chatwoot:
    profiles: ["chatwoot"]
    build:
      context: ../chatwoot
    depends_on:
      - chatwoot-postgres
      - chatwoot-redis
    env_file:
      - path: ../.env.chatwoot
        required: false
    environment:
      RAILS_ENV: production
      NODE_ENV: production
      POSTGRES_HOST: chatwoot-postgres
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: ${CHATWOOT_POSTGRES_DB:-chatwoot}
      POSTGRES_USERNAME: ${CHATWOOT_POSTGRES_USER:-chatwoot}
      POSTGRES_PASSWORD: ${CHATWOOT_POSTGRES_PASSWORD:-chatwoot}
      REDIS_URL: redis://chatwoot-redis:6379
      FRONTEND_URL: ${CHATWOOT_FRONTEND_URL:-http://localhost:3001}
    ports:
      - "127.0.0.1:${CHATWOOT_PORT:-3001}:3000"
    restart: unless-stopped

volumes:
  chatwoot-postgres-data:
  chatwoot-redis-data:
